<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mindset Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #262626;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent: #d4af37; /* Gold accent */
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .chip {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-width: 1px;
            border-style: solid;
        }
        .chip-active {
            color: #000 !important;
            font-weight: 600;
            background-color: var(--cat-color) !important;
            border-color: var(--cat-color) !important;
        }
        
        /* --- Random Container Animations --- */
        .anim-fade { animation: animFade 0.8s ease-out forwards; }
        .anim-slide { animation: animSlide 0.8s ease-out forwards; }
        .anim-zoom { animation: animZoom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .anim-blur { animation: animBlur 1s ease-out forwards; }

        @keyframes animFade { from { opacity: 0; } to { opacity: 1; } }
        @keyframes animSlide { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes animZoom { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes animBlur { from { opacity: 0; filter: blur(12px); } to { opacity: 1; filter: blur(0); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #progress-bar {
            height: 2px;
            background-color: var(--accent);
            width: 0%;
            transition: width 8s linear;
        }
        
        .cursor::after {
            content: '|';
            color: var(--accent);
            animation: blink 0.7s infinite;
            margin-left: 2px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 50;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Auto-flip Progress Indicator -->
    <div class="fixed top-0 left-0 w-full h-1 bg-white/5">
        <div id="progress-bar"></div>
    </div>

    <!-- Header -->
    <header class="p-6 pt-12 pb-4 flex justify-between items-center">
        <div>
            <h1 class="text-xs font-bold tracking-[0.2em] text-secondary uppercase opacity-60">Mindset Navigator</h1>
            <div id="auto-indicator" class="text-[10px] text-[var(--accent)] font-bold mt-1">AUTO FLIP: 8s</div>
        </div>
        <button onclick="openModal()" class="w-10 h-10 rounded-full bg-neutral-800 flex items-center justify-center border border-neutral-700 active:scale-90 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        </button>
    </header>

    <!-- Category Filter -->
    <div id="category-container" class="flex overflow-x-auto px-6 py-2 gap-2 no-scrollbar">
        <!-- JSで生成 -->
    </div>

    <!-- Main Quote Area -->
    <main class="flex-grow flex flex-col justify-center px-8 py-12">
        <div id="display-area">
            <div id="category-label" class="text-xs font-bold mb-4 tracking-widest uppercase" style="color: var(--accent)">Connecting...</div>
            <div id="quote-container">
                <p id="quote-text" class="text-2xl md:text-3xl font-bold leading-relaxed mb-6"></p>
                <p id="quote-author" class="text-sm text-secondary italic opacity-0 transition-opacity duration-1000"></p>
            </div>
        </div>
    </main>

    <!-- Footer Controls -->
    <footer class="p-8 pb-12 flex flex-col gap-4">
        <button onclick="manualNext()" id="next-btn" class="w-full py-4 bg-neutral-100 text-black font-bold rounded-2xl shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-2">
            <span>Next Insight</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
    </footer>

    <!-- Add Insight Modal -->
    <div id="add-modal" class="modal">
        <div class="bg-[#262626] w-full max-w-md p-8 rounded-3xl border border-neutral-800 shadow-2xl">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <span class="text-[var(--accent)]">●</span> 自分の気づきを登録
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase tracking-widest text-secondary block mb-1">Category</label>
                    <select id="new-category" class="w-full bg-neutral-900 border border-neutral-700 rounded-xl p-3 text-sm focus:outline-none focus:border-[var(--accent)]">
                        <option value="仕事">仕事</option>
                        <option value="人間関係">人間関係</option>
                        <option value="成功">成功</option>
                        <option value="健康">健康</option>
                        <option value="資産運用">資産運用</option>
                        <option value="nimogram">nimogram</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] uppercase tracking-widest text-secondary block mb-1">Content</label>
                    <textarea id="new-content" rows="3" class="w-full bg-neutral-900 border border-neutral-700 rounded-xl p-3 text-sm focus:outline-none focus:border-[var(--accent)]" placeholder="今の気づきを入力..."></textarea>
                </div>
                <div>
                    <label class="text-[10px] uppercase tracking-widest text-secondary block mb-1">Author (Optional)</label>
                    <input id="new-author" type="text" class="w-full bg-neutral-900 border border-neutral-700 rounded-xl p-3 text-sm focus:outline-none focus:border-[var(--accent)]" placeholder="自分, 本のタイトルなど">
                </div>
            </div>
            <div class="mt-8 flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-3 text-sm text-secondary font-bold">Cancel</button>
                <button onclick="submitInsight()" id="submit-btn" class="flex-[2] py-3 bg-[var(--accent)] text-black text-sm font-bold rounded-xl shadow-lg active:scale-95 transition-transform">Save Insight</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            spreadsheetId: '1C_v9kxABeLRIWBu5on_mM6yaW4vl1kchsTrzTYZNTqg',
            tabName: 'シート1',
            intervalMs: 8000,
            typingSpeed: 40,
            // ★GAS WebアプリのURLをここに貼ると書き込み可能になります
            scriptUrl: '' 
        };

        const CAT_COLORS = {
            'ALL': '#d4af37',
            '仕事': '#3b82f6',
            '人間関係': '#f43f5e',
            '成功': '#fbbf24',
            '健康': '#10b981',
            '資産運用': '#8b5cf6',
            'nimogram': '#d4af37',
            '未分類': '#a0a0a0'
        };

        const ANIMATIONS = ['anim-fade', 'anim-slide', 'anim-zoom', 'anim-blur'];

        let rawData = [];
        let filteredData = [];
        let currentCategory = 'ALL';
        let autoFlipTimer = null;
        let typingInterval = null;

        async function loadData() {
            if (!CONFIG.spreadsheetId || CONFIG.spreadsheetId.includes('YOUR_SPREADSHEET_ID')) {
                showError("設定エラー", "IDが設定されていません。");
                return;
            }

            const url = `https://docs.google.com/spreadsheets/d/${CONFIG.spreadsheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(CONFIG.tabName)}`;
            
            try {
                const response = await fetch(url, { cache: "no-store" });
                if (!response.ok) throw new Error(`Status: ${response.status}`);
                
                const text = await response.text();
                const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);/);
                if (!match) throw new Error('解析エラー');
                
                const jsonData = JSON.parse(match[1]);
                rawData = jsonData.table.rows.map(row => ({
                    category: (row.c && row.c[0] && row.c[0].v !== null) ? String(row.c[0].v) : '未分類',
                    content: (row.c && row.c[1] && row.c[1].v !== null) ? String(row.c[1].v) : '',
                    author: (row.c && row.c[2] && row.c[2].v !== null) ? String(row.c[2].v) : ''
                })).filter(item => item.content.trim() !== '');

                renderCategories();
                setCategory(currentCategory);
            } catch (error) {
                showError("接続エラー", error.message);
            }
        }

        function renderCategories() {
            const container = document.getElementById('category-container');
            const categories = ['ALL', ...new Set(rawData.map(item => item.category))];
            
            container.innerHTML = categories.map(cat => {
                const color = CAT_COLORS[cat] || '#888';
                return `
                    <button onclick="setCategory('${cat}')" id="cat-${cat}" 
                        class="chip whitespace-nowrap px-5 py-2 rounded-full text-xs" 
                        style="--cat-color: ${color}; border-color: ${color}; color: ${color}; background: transparent;">
                        ${cat}
                    </button>
                `;
            }).join('');
        }

        function setCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.chip').forEach(btn => btn.classList.remove('chip-active'));
            const activeBtn = document.getElementById(`cat-${category}`);
            if (activeBtn) activeBtn.classList.add('chip-active');

            filteredData = (category === 'ALL') ? rawData : rawData.filter(item => item.category === category);
            
            resetAutoFlip();
            displayNext();
        }

        function typeWriter(text, element, callback) {
            let i = 0;
            element.innerHTML = '';
            element.classList.add('cursor');
            
            if (typingInterval) clearInterval(typingInterval);
            
            typingInterval = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                } else {
                    clearInterval(typingInterval);
                    element.classList.remove('cursor');
                    if (callback) callback();
                }
            }, CONFIG.typingSpeed);
        }

        function displayNext() {
            if (filteredData.length === 0) return;

            const displayArea = document.getElementById('display-area');
            const textEl = document.getElementById('quote-text');
            const authorEl = document.getElementById('quote-author');
            const labelEl = document.getElementById('category-label');
            
            ANIMATIONS.forEach(cls => displayArea.classList.remove(cls));
            void displayArea.offsetWidth; 
            const randomAnim = ANIMATIONS[Math.floor(Math.random() * ANIMATIONS.length)];
            displayArea.classList.add(randomAnim);

            const randomIndex = Math.floor(Math.random() * filteredData.length);
            const item = filteredData[randomIndex];

            labelEl.innerText = item.category;
            labelEl.style.color = CAT_COLORS[item.category] || 'var(--accent)';
            authorEl.style.opacity = '0';
            authorEl.innerText = item.author ? `— ${item.author}` : '';

            typeWriter(item.content, textEl, () => {
                authorEl.style.opacity = '0.8';
            });

            animateProgressBar();
        }

        function manualNext() {
            resetAutoFlip();
            displayNext();
        }

        function resetAutoFlip() {
            if (autoFlipTimer) clearInterval(autoFlipTimer);
            
            const bar = document.getElementById('progress-bar');
            bar.style.transition = 'none';
            bar.style.width = '0%';
            
            autoFlipTimer = setInterval(() => {
                displayNext();
            }, CONFIG.intervalMs);
        }

        function animateProgressBar() {
            const bar = document.getElementById('progress-bar');
            bar.style.transition = 'none';
            bar.style.width = '0%';
            
            setTimeout(() => {
                bar.style.transition = `width ${CONFIG.intervalMs}ms linear`;
                bar.style.width = '100%';
            }, 50);
        }

        // Modal Functions
        function openModal() {
            document.getElementById('add-modal').classList.add('active');
            if (autoFlipTimer) clearInterval(autoFlipTimer); // 入力中はタイマー停止
        }

        function closeModal() {
            document.getElementById('add-modal').classList.remove('active');
            resetAutoFlip();
        }

        async function submitInsight() {
            const cat = document.getElementById('new-category').value;
            const content = document.getElementById('new-content').value;
            const author = document.getElementById('new-author').value;
            const btn = document.getElementById('submit-btn');

            if (!content) return;

            btn.innerText = "Saving...";
            btn.disabled = true;

            // GAS連携がない場合のフォールバック（成功メッセージだけ出す）
            if (!CONFIG.scriptUrl) {
                console.log("Mock save:", {cat, content, author});
                setTimeout(() => {
                    alert("スプレッドシートへの保存にはGoogle Apps ScriptのURL設定が必要です。");
                    btn.innerText = "Save Insight";
                    btn.disabled = false;
                    closeModal();
                }, 1000);
                return;
            }

            try {
                await fetch(CONFIG.scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category: cat, content: content, author: author })
                });
                btn.innerText = "Success!";
                setTimeout(() => {
                    btn.innerText = "Save Insight";
                    btn.disabled = false;
                    closeModal();
                    loadData(); // データを再読み込み
                }, 1500);
            } catch (e) {
                alert("保存に失敗しました");
                btn.disabled = false;
                btn.innerText = "Save Insight";
            }
        }

        function showError(title, message) {
            document.getElementById('category-label').innerText = "ERROR";
            document.getElementById('quote-text').innerHTML = `<span class="text-red-400">${title}</span><br><span class="text-sm font-normal opacity-70">${message}</span>`;
        }

        window.onload = loadData;
    </script>
</body>
</html>
