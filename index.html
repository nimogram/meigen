<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mindset Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-primary: #ffffff;
            --text-secondary: #52525b;
            --accent: #d4af37;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        /* カテゴリーボタン（共通） */
        .chip {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-width: 1px;
            background-color: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.1;
            padding: 8px;
        }
        .chip-active {
            color: #ffffff !important;
            font-weight: 800;
            background-color: var(--cat-color) !important;
            border-color: var(--cat-color) !important;
            box-shadow: 0 0 15px var(--cat-color-alpha);
            transform: scale(0.98);
        }
        
        /* ALL専用（エメラルドグリーン背景・フルワイド） */
        #cat-ALL {
            background-color: #10b981;
            border-color: #10b981;
            color: #ffffff !important;
            grid-column: span 3; /* グリッドの上で横一杯に広げる */
            height: 60px;
            font-size: 16px;
            letter-spacing: 0.2em;
        }
        #cat-ALL.chip-active {
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.6);
            opacity: 0.9;
        }

        /* アニメーション演出 */
        .anim-fade { animation: animFade 0.8s ease-out forwards; }
        .anim-slide { animation: animSlide 0.8s ease-out forwards; }
        .anim-zoom { animation: animZoom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .anim-blur { animation: animBlur 1.2s ease-out forwards; }

        @keyframes animFade { from { opacity: 0; } to { opacity: 1; } }
        @keyframes animSlide { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes animZoom { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
        @keyframes animBlur { from { opacity: 0; filter: blur(20px); } to { opacity: 1; filter: blur(0); } }

        #progress-bar {
            height: 2px;
            background-color: var(--accent);
            width: 0%;
            transition: width 8s linear;
        }
        
        .cursor::after {
            content: '|';
            color: var(--accent);
            animation: blink 0.7s infinite;
            margin-left: 2px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active { display: flex; }

        .quote-text {
            background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="select-none">

    <!-- Timer Indicator -->
    <div class="fixed top-0 left-0 w-full h-0.5 bg-white/5 z-50">
        <div id="progress-bar"></div>
    </div>

    <!-- Minimal Header -->
    <header class="px-6 pt-12 pb-2 flex justify-between items-center">
        <div class="opacity-10 text-[8px] font-black tracking-[0.5em] uppercase">Private Intelligence</div>
        <button onclick="openModal()" class="w-10 h-10 rounded-full bg-neutral-900/50 flex items-center justify-center border border-neutral-800 active:scale-90 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-[var(--accent)]"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        </button>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow flex flex-col justify-center px-10">
        <div id="display-area" class="w-full max-w-lg mx-auto">
            <div id="quote-container" class="min-h-[200px]">
                <p id="quote-text" class="text-3xl md:text-5xl font-black leading-tight mb-8 quote-text"></p>
                <p id="quote-author" class="text-sm text-secondary italic opacity-0 transition-opacity duration-1000"></p>
            </div>
        </div>
    </main>

    <!-- Navigation Grid (Full-width ALL + 3 Columns Grid) -->
    <footer class="px-4 pb-12 pt-6 bg-gradient-to-t from-black to-transparent">
        <div id="category-container" class="grid grid-cols-3 gap-2.5">
            <!-- JS populated: ALL will be first and full-width -->
        </div>
    </footer>

    <!-- Add Insight Modal -->
    <div id="add-modal" class="modal">
        <div class="bg-[#111] w-full max-w-sm p-8 rounded-[2.5rem] border border-neutral-800 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-[var(--accent)]"></div>
            <h2 class="text-lg font-black mb-8 text-center tracking-widest uppercase">Stock Insight</h2>
            <div class="space-y-4">
                <select id="new-category" class="w-full bg-neutral-900 border border-neutral-800 rounded-xl p-4 text-sm font-bold text-white focus:outline-none focus:border-[var(--accent)] appearance-none">
                    <option value="NIMOGRAM">NIMOGRAM</option>
                    <option value="FINANCE">FINANCE</option>
                    <option value="Mindset">Mindset</option>
                    <option value="Communication">Communication</option>
                    <option value="Mechanism">Mechanism</option>
                    <option value="Strategy & Leadership">Strategy & Leadership</option>
                </select>
                <textarea id="new-content" rows="4" class="w-full bg-neutral-900 border border-neutral-800 rounded-xl p-4 text-sm text-white focus:outline-none focus:border-[var(--accent)]" placeholder="思考を言語化する..."></textarea>
                <input id="new-author" type="text" class="w-full bg-neutral-900 border border-neutral-800 rounded-xl p-4 text-sm text-white focus:outline-none focus:border-[var(--accent)]" placeholder="出典（任意）">
            </div>
            <div class="mt-8 flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-4 text-xs text-secondary font-bold">CLOSE</button>
                <button onclick="submitInsight()" id="submit-btn" class="flex-[2] py-4 bg-[var(--accent)] text-black text-xs font-black rounded-xl shadow-xl active:scale-95 transition-transform">SAVE</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            spreadsheetId: '1C_v9kxABeLRIWBu5on_mM6yaW4vl1kchsTrzTYZNTqg',
            tabName: 'シート1',
            intervalMs: 8000,
            typingSpeed: 120, 
            scriptUrl: '' 
        };

        const CAT_SETTINGS = {
            'ALL': { color: '#10b981', alpha: 'rgba(16,185,129,0.4)' },
            'FINANCE': { color: '#059669', alpha: 'rgba(5,150,105,0.4)' },
            'Mindset': { color: '#6366f1', alpha: 'rgba(99,102,241,0.4)' },
            'Communication': { color: '#ec4899', alpha: 'rgba(236,72,153,0.4)' },
            'Mechanism': { color: '#06b6d4', alpha: 'rgba(6,182,212,0.4)' },
            'Strategy & Leadership': { color: '#8b5cf6', alpha: 'rgba(139,92,246,0.4)' },
            'NIMOGRAM': { color: '#d4af37', alpha: 'rgba(212,175,55,0.4)' },
            '未分類': { color: '#525252', alpha: 'rgba(82,82,82,0.4)' }
        };

        const ANIMATIONS = ['anim-fade', 'anim-slide', 'anim-zoom', 'anim-blur'];

        let rawData = [];
        let filteredData = [];
        let currentCategory = 'ALL';
        let autoFlipTimer = null;
        let typingInterval = null;

        async function loadData() {
            if (!CONFIG.spreadsheetId || CONFIG.spreadsheetId.includes('YOUR_SPREADSHEET_ID')) {
                showError("ID REQUIRED", "スプレッドシートIDを入力してください。");
                return;
            }

            const url = `https://docs.google.com/spreadsheets/d/${CONFIG.spreadsheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(CONFIG.tabName)}`;
            
            try {
                const response = await fetch(url, { cache: "no-store" });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const text = await response.text();
                const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);/);
                if (!match) throw new Error('PARSE ERROR');
                
                const jsonData = JSON.parse(match[1]);
                rawData = jsonData.table.rows.map(row => ({
                    category: (row.c && row.c[0] && row.c[0].v !== null) ? String(row.c[0].v) : '未分類',
                    content: (row.c && row.c[1] && row.c[1].v !== null) ? String(row.c[1].v) : '',
                    author: (row.c && row.c[2] && row.c[2].v !== null) ? String(row.c[2].v) : ''
                })).filter(item => item.content.trim() !== '');

                renderCategories();
                setCategory(currentCategory);
            } catch (error) {
                showError("CONNECT ERROR", error.message);
            }
        }

        function renderCategories() {
            const container = document.getElementById('category-container');
            const defaultCats = ['ALL', 'FINANCE', 'Mindset', 'Communication', 'Mechanism', 'Strategy & Leadership', 'NIMOGRAM'];
            
            container.innerHTML = defaultCats.map(cat => {
                const settings = CAT_SETTINGS[cat] || CAT_SETTINGS['未分類'];
                const isAll = cat === 'ALL';
                return `
                    <button onclick="setCategory('${cat}')" id="cat-${cat}" 
                        class="chip rounded-xl text-[13px] font-bold tracking-tight uppercase border border-white/10 ${isAll ? 'mb-2' : ''}" 
                        style="--cat-color: ${settings.color}; --cat-color-alpha: ${settings.alpha}; border-color: ${isAll ? '#10b981' : settings.color + '44'}; color: ${isAll ? '#fff' : settings.color};">
                        ${cat}
                    </button>
                `;
            }).join('');
        }

        function setCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.chip').forEach(btn => btn.classList.remove('chip-active'));
            const activeBtn = document.getElementById(`cat-${category}`);
            if (activeBtn) activeBtn.classList.add('chip-active');

            filteredData = (category === 'ALL') ? rawData : rawData.filter(item => item.category === category);
            
            resetAutoFlip();
            displayNext();
        }

        function typeWriter(text, element, callback) {
            let i = 0;
            element.innerHTML = '';
            element.classList.add('cursor');
            
            if (typingInterval) clearInterval(typingInterval);
            
            typingInterval = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                } else {
                    clearInterval(typingInterval);
                    element.classList.remove('cursor');
                    if (callback) callback();
                }
            }, CONFIG.typingSpeed);
        }

        function displayNext() {
            if (filteredData.length === 0) {
                document.getElementById('quote-text').innerHTML = `<span class="opacity-10 text-lg font-normal tracking-normal text-white italic">Waiting for ${currentCategory}...</span>`;
                document.getElementById('quote-author').innerText = "";
                return;
            }

            const displayArea = document.getElementById('display-area');
            const textEl = document.getElementById('quote-text');
            const authorEl = document.getElementById('quote-author');
            
            ANIMATIONS.forEach(cls => displayArea.classList.remove(cls));
            void displayArea.offsetWidth; 
            const randomAnim = ANIMATIONS[Math.floor(Math.random() * ANIMATIONS.length)];
            displayArea.classList.add(randomAnim);

            const randomIndex = Math.floor(Math.random() * filteredData.length);
            const item = filteredData[randomIndex];

            authorEl.style.opacity = '0';
            authorEl.innerText = item.author ? `— ${item.author}` : '';

            typeWriter(item.content, textEl, () => {
                authorEl.style.opacity = '0.4';
            });

            animateProgressBar();
        }

        function resetAutoFlip() {
            if (autoFlipTimer) clearInterval(autoFlipTimer);
            const bar = document.getElementById('progress-bar');
            bar.style.transition = 'none';
            bar.style.width = '0%';
            autoFlipTimer = setInterval(() => displayNext(), CONFIG.intervalMs);
        }

        function animateProgressBar() {
            const bar = document.getElementById('progress-bar');
            bar.style.transition = 'none';
            bar.style.width = '0%';
            setTimeout(() => {
                bar.style.transition = `width ${CONFIG.intervalMs}ms linear`;
                bar.style.width = '100%';
            }, 50);
        }

        function openModal() {
            document.getElementById('add-modal').classList.add('active');
            if (autoFlipTimer) clearInterval(autoFlipTimer); 
            if (typingInterval) clearInterval(typingInterval);
        }

        function closeModal() {
            document.getElementById('add-modal').classList.remove('active');
            resetAutoFlip();
        }

        async function submitInsight() {
            const cat = document.getElementById('new-category').value;
            const content = document.getElementById('new-content').value;
            const author = document.getElementById('new-author').value;
            const btn = document.getElementById('submit-btn');
            if (!content) return;
            btn.innerText = "SAVING...";
            btn.disabled = true;

            if (!CONFIG.scriptUrl) {
                setTimeout(() => {
                    alert("GAS URL missing.");
                    btn.innerText = "SAVE";
                    btn.disabled = false;
                    closeModal();
                }, 800);
                return;
            }

            try {
                await fetch(CONFIG.scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category: cat, content: content, author: author })
                });
                btn.innerText = "DONE!";
                setTimeout(() => {
                    btn.innerText = "SAVE";
                    btn.disabled = false;
                    closeModal();
                    loadData(); 
                }, 1500);
            } catch (e) {
                alert("Error");
                btn.disabled = false;
                btn.innerText = "SAVE";
            }
        }

        function showError(title, message) {
            document.getElementById('quote-text').innerHTML = `<span class="text-red-500 font-black text-xl uppercase">${title}</span><br><span class="text-[8px] font-normal text-secondary opacity-30">${message}</span>`;
        }

        window.onload = loadData;
    </script>
</body>
</html>
