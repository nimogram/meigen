<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mindset Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent: #d4af37;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        /* カテゴリーボタン（カラフル） */
        .chip {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-width: 2px;
            filter: saturate(0.8) brightness(0.9);
        }
        .chip-active {
            color: #ffffff !important;
            font-weight: 800;
            background-color: var(--cat-color) !important;
            border-color: var(--cat-color) !important;
            box-shadow: 0 0 20px var(--cat-color-alpha);
            transform: translateY(-4px);
            filter: saturate(1.2) brightness(1.1);
        }
        
        /* アニメーション */
        .anim-fade { animation: animFade 0.8s ease-out forwards; }
        .anim-slide { animation: animSlide 0.8s ease-out forwards; }
        .anim-zoom { animation: animZoom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .anim-blur { animation: animBlur 1.2s ease-out forwards; }

        @keyframes animFade { from { opacity: 0; } to { opacity: 1; } }
        @keyframes animSlide { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes animZoom { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
        @keyframes animBlur { from { opacity: 0; filter: blur(20px); } to { opacity: 1; filter: blur(0); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #progress-bar {
            height: 3px;
            background-color: var(--accent);
            width: 0%;
            transition: width 8s linear;
        }
        
        .cursor::after {
            content: '|';
            color: var(--accent);
            animation: blink 0.7s infinite;
            margin-left: 2px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .modal.active { display: flex; }

        /* グラデーションテキスト */
        .gradient-text {
            background: linear-gradient(to bottom right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col select-none">

    <!-- 8秒タイマーバー -->
    <div class="fixed top-0 left-0 w-full h-1 bg-white/5 z-50">
        <div id="progress-bar"></div>
    </div>

    <!-- ヘッダー -->
    <header class="px-6 pt-12 pb-4 flex justify-between items-start">
        <div>
            <h1 class="text-[10px] font-black tracking-[0.4em] text-secondary uppercase opacity-40">Mindset Navigator</h1>
            <div id="auto-indicator" class="text-[9px] text-[var(--accent)] font-bold mt-1 tracking-widest animate-pulse">8s SYNC</div>
        </div>
        <button onclick="openModal()" class="w-10 h-10 rounded-full bg-neutral-900 flex items-center justify-center border border-neutral-800 active:scale-90 transition-transform shadow-2xl">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-[var(--accent)]"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        </button>
    </header>

    <!-- メイン表示エリア -->
    <main class="flex-grow flex flex-col justify-center px-10">
        <div id="display-area" class="w-full max-w-lg mx-auto">
            <!-- Categoryラベルは削除しました -->
            <div id="quote-container" class="min-h-[250px]">
                <p id="quote-text" class="text-3xl md:text-5xl font-black leading-[1.3] mb-10 gradient-text"></p>
                <p id="quote-author" class="text-base text-secondary italic opacity-0 transition-opacity duration-1000 font-medium tracking-tight"></p>
            </div>
        </div>
    </main>

    <!-- 下部コントロールパネル -->
    <footer class="px-4 pb-12 flex flex-col gap-6">
        <!-- カテゴリー選択（下部へ移動 & カラフル） -->
        <div id="category-container" class="flex overflow-x-auto px-2 py-2 gap-3 no-scrollbar">
            <!-- JSで動的に生成 -->
        </div>

        <!-- 次へボタン -->
        <button onclick="manualNext()" id="next-btn" class="w-full py-5 bg-white text-black font-black rounded-[2rem] shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-4 group">
            <span class="text-lg">NEXT INSIGHT</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-1 transition-transform"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
    </footer>

    <!-- 新規登録モーダル -->
    <div id="add-modal" class="modal">
        <div class="bg-[#111] w-full max-w-sm p-10 rounded-[3rem] border border-neutral-800 shadow-2xl relative">
            <h2 class="text-xl font-black mb-10 text-center">INSIGHT STOCK</h2>
            <div class="space-y-6">
                <select id="new-category" class="w-full bg-neutral-900 border-2 border-neutral-800 rounded-2xl p-5 text-base font-bold text-white focus:outline-none focus:border-[var(--accent)] appearance-none">
                    <option value="自分メモ">自分メモ</option>
                    <option value="仕事">仕事</option>
                    <option value="人間関係">人間関係</option>
                    <option value="成功">成功</option>
                    <option value="健康">健康</option>
                    <option value="資産運用">資産運用</option>
                    <option value="nimogram">nimogram</option>
                </select>
                <textarea id="new-content" rows="4" class="w-full bg-neutral-900 border-2 border-neutral-800 rounded-2xl p-5 text-base text-white focus:outline-none focus:border-[var(--accent)]" placeholder="言語化する..."></textarea>
                <input id="new-author" type="text" class="w-full bg-neutral-900 border-2 border-neutral-800 rounded-2xl p-5 text-base text-white focus:outline-none focus:border-[var(--accent)]" placeholder="出典（任意）">
            </div>
            <div class="mt-12 flex gap-4">
                <button onclick="closeModal()" class="flex-1 py-4 text-sm text-secondary font-bold">CLOSE</button>
                <button onclick="submitInsight()" id="submit-btn" class="flex-[2] py-4 bg-[var(--accent)] text-black text-sm font-black rounded-2xl shadow-xl active:scale-95 transition-transform">SAVE</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            spreadsheetId: '1C_v9kxABeLRIWBu5on_mM6yaW4vl1kchsTrzTYZNTqg',
            tabName: 'シート1',
            intervalMs: 8000,
            typingSpeed: 120, // さらにじっくり（120ms）
            scriptUrl: '' 
        };

        const CAT_SETTINGS = {
            'ALL': { color: '#ffffff', alpha: 'rgba(255,255,255,0.2)' },
            '自分メモ': { color: '#ec4899', alpha: 'rgba(236,72,153,0.4)' }, // 鮮やかなピンク
            '仕事': { color: '#3b82f6', alpha: 'rgba(59,130,246,0.4)' },   // ブルー
            '人間関係': { color: '#ef4444', alpha: 'rgba(239,68,68,0.4)' }, // レッド
            '成功': { color: '#f59e0b', alpha: 'rgba(245,158,11,0.4)' },   // アンバー
            '健康': { color: '#10b981', alpha: 'rgba(16,185,129,0.4)' },   // エメラルド
            '資産運用': { color: '#8b5cf6', alpha: 'rgba(139,92,246,0.4)' }, // パープル
            'nimogram': { color: '#d4af37', alpha: 'rgba(212,175,55,0.4)' }, // ゴールド
            '未分類': { color: '#525252', alpha: 'rgba(82,82,82,0.4)' }
        };

        const ANIMATIONS = ['anim-fade', 'anim-slide', 'anim-zoom', 'anim-blur'];

        let rawData = [];
        let filteredData = [];
        let currentCategory = 'ALL';
        let autoFlipTimer = null;
        let typingInterval = null;

        async function loadData() {
            if (!CONFIG.spreadsheetId || CONFIG.spreadsheetId.includes('YOUR_SPREADSHEET_ID')) {
                showError("ID REQUIRED", "スプレッドシートIDを入力してください。");
                return;
            }

            const url = `https://docs.google.com/spreadsheets/d/${CONFIG.spreadsheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(CONFIG.tabName)}`;
            
            try {
                const response = await fetch(url, { cache: "no-store" });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const text = await response.text();
                const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);/);
                if (!match) throw new Error('PARSE ERROR');
                
                const jsonData = JSON.parse(match[1]);
                rawData = jsonData.table.rows.map(row => ({
                    category: (row.c && row.c[0] && row.c[0].v !== null) ? String(row.c[0].v) : '未分類',
                    content: (row.c && row.c[1] && row.c[1].v !== null) ? String(row.c[1].v) : '',
                    author: (row.c && row.c[2] && row.c[2].v !== null) ? String(row.c[2].v) : ''
                })).filter(item => item.content.trim() !== '');

                renderCategories();
                setCategory(currentCategory);
            } catch (error) {
                showError("CONNECT ERROR", error.message);
            }
        }

        function renderCategories() {
            const container = document.getElementById('category-container');
            // ジャンルの並び順を固定（自分メモを優先）
            const fixedOrder = ['ALL', '自分メモ', '仕事', '人間関係', '成功', '健康', '資産運用', 'nimogram'];
            const existingCats = [...new Set(rawData.map(item => item.category))];
            const categories = fixedOrder.filter(cat => cat === 'ALL' || existingCats.includes(cat));
            
            // fixedOrderにないカテゴリーも追加
            existingCats.forEach(cat => {
                if (!categories.includes(cat)) categories.push(cat);
            });
            
            container.innerHTML = categories.map(cat => {
                const settings = CAT_SETTINGS[cat] || CAT_SETTINGS['未分類'];
                return `
                    <button onclick="setCategory('${cat}')" id="cat-${cat}" 
                        class="chip whitespace-nowrap px-8 py-3 rounded-2xl text-[12px] font-black tracking-widest uppercase border-2 shadow-lg" 
                        style="--cat-color: ${settings.color}; --cat-color-alpha: ${settings.alpha}; border-color: ${settings.color}; color: ${settings.color}; background: transparent;">
                        ${cat}
                    </button>
                `;
            }).join('');
        }

        function setCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.chip').forEach(btn => btn.classList.remove('chip-active'));
            const activeBtn = document.getElementById(`cat-${category}`);
            if (activeBtn) activeBtn.classList.add('chip-active');

            filteredData = (category === 'ALL') ? rawData : rawData.filter(item => item.category === category);
            
            resetAutoFlip();
            displayNext();
        }

        function typeWriter(text, element, callback) {
            let i = 0;
            element.innerHTML = '';
            element.classList.add('cursor');
            
            if (typingInterval) clearInterval(typingInterval);
            
            typingInterval = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                } else {
                    clearInterval(typingInterval);
                    element.classList.remove('cursor');
                    if (callback) callback();
                }
            }, CONFIG.typingSpeed);
        }

        function displayNext() {
            if (filteredData.length === 0) return;

            const displayArea = document.getElementById('display-area');
            const textEl = document.getElementById('quote-text');
            const authorEl = document.getElementById('quote-author');
            
            ANIMATIONS.forEach(cls => displayArea.classList.remove(cls));
            void displayArea.offsetWidth; 
            const randomAnim = ANIMATIONS[Math.floor(Math.random() * ANIMATIONS.length)];
            displayArea.classList.add(randomAnim);

            const randomIndex = Math.floor(Math.random() * filteredData.length);
            const item = filteredData[randomIndex];

            authorEl.style.opacity = '0';
            authorEl.innerText = item.author ? `— ${item.author}` : '';

            typeWriter(item.content, textEl, () => {
                authorEl.style.opacity = '0.5';
            });

            animateProgressBar();
        }

        function manualNext() {
            resetAutoFlip();
            displayNext();
        }

        function resetAutoFlip() {
            if (autoFlipTimer) clearInterval(autoFlipTimer);
            
            const bar = document.getElementById('progress-bar');
            bar.style.transition = 'none';
            bar.style.width = '0%';
            
            autoFlipTimer = setInterval(() => {
                displayNext();
            }, CONFIG.intervalMs);
        }

        function animateProgressBar() {
            const bar = document.getElementById('progress-bar');
            bar.style.transition = 'none';
            bar.style.width = '0%';
            
            setTimeout(() => {
                bar.style.transition = `width ${CONFIG.intervalMs}ms linear`;
                bar.style.width = '100%';
            }, 50);
        }

        function openModal() {
            document.getElementById('add-modal').classList.add('active');
            if (autoFlipTimer) clearInterval(autoFlipTimer); 
            if (typingInterval) clearInterval(typingInterval);
        }

        function closeModal() {
            document.getElementById('add-modal').classList.remove('active');
            resetAutoFlip();
        }

        async function submitInsight() {
            const cat = document.getElementById('new-category').value;
            const content = document.getElementById('new-content').value;
            const author = document.getElementById('new-author').value;
            const btn = document.getElementById('submit-btn');

            if (!content) return;

            btn.innerText = "SAVING...";
            btn.disabled = true;

            if (!CONFIG.scriptUrl) {
                console.log("Mock saved:", {cat, content, author});
                setTimeout(() => {
                    alert("GAS連携URLが未設定です。設定後に書き込みが可能になります。");
                    btn.innerText = "SAVE";
                    btn.disabled = false;
                    closeModal();
                }, 1000);
                return;
            }

            try {
                await fetch(CONFIG.scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category: cat, content: content, author: author })
                });
                btn.innerText = "SUCCESS";
                setTimeout(() => {
                    btn.innerText = "SAVE";
                    btn.disabled = false;
                    closeModal();
                    loadData(); 
                }, 1500);
            } catch (e) {
                alert("送信に失敗しました");
                btn.disabled = false;
                btn.innerText = "SAVE";
            }
        }

        function showError(title, message) {
            document.getElementById('quote-text').innerHTML = `<span class="text-red-500 font-black text-2xl uppercase">${title}</span><br><span class="text-sm font-normal text-secondary">${message}</span>`;
        }

        window.onload = loadData;
    </script>
</body>
</html>
